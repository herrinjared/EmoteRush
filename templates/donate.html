<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate to {{ streamer_name }} - EmoteRush</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
      }
      .container {
        max-width: 800px;
        margin-top: 50px;
      }
      .profile-pic {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 20px;
      }
      .card {
        border: none;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }
      .btn-donate {
        background-color: #6441a5; /* Twitch purple */
        border-color: #6441a5;
      }
      .btn-donate:hover {
        background-color: #50338c;
        border-color: #50338c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card p-4">
        <div class="text-center">
          {% if streamer_profile_pic %}
          <img src="{{ streamer_profile_pic }}" alt="{{ streamer_name }}'s Profile Picture" class="profile-pic" />
          {% endif %}
          <h2>Donate to {{ streamer_name }}</h2>
          <p>Support your favorite streamer and unlock emotes!</p>
        </div>
        <form method="post" class="mt-4">
          {% csrf_token %}
          <div class="mb-3">
            <label for="amount" class="form-label">Amount ($):</label>
            <input type="number" class="form-control" id="amount" name="amount" min="1" step="0.01" required />
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="anonymous" name="anonymous" />
            <label class="form-check-label" for="anonymous">Donate Anonymously</label>
          </div>
          <button type="submit" class="btn btn-donate btn-lg w-100 text-white">Donate via PayPal</button>
        </form>
        <div class="text-center mt-3">
          <p class="text-muted">Note: A processing fee (2.9% + $0.30) will be added.</p>
          <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Back to Dashboard</a>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
