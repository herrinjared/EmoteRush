<!DOCTYPE html>
<html>
  <head>
    <title>Donate to {{ streamer_name }}</title>
  </head>
  <body>
    <h1>Donate to {{ streamer_name }}</h1>
    <form method="post">
      {% csrf_token %}
      <label
        >Amount ($):
        <input
          type="number"
          name="amount"
          min="1"
          step="0.01"
          required /></label
      ><br />
      <label
        ><input type="checkbox" name="anonymous" /> Donate Anonymously</label
      ><br />
      <button type="submit">Donate via PayPal</button>
    </form>
    <p>Note: A processing fee (2.9% + $0.30) will be added.</p>
  </body>
</html>
